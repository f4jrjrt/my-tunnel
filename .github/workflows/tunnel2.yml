name: VPN Server (WireGuard)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Install WireGuard
      run: |
        sudo apt update
        sudo apt install -y wireguard

    - name: Setup WireGuard Server
      run: |
        cd /etc/wireguard
        sudo umask 077
        sudo wg genkey | sudo tee server.key | sudo wg pubkey | sudo tee server.pub
        sudo wg genkey | sudo tee client.key | sudo wg pubkey | sudo tee client.pub
        
        SERVER_KEY=$(sudo cat server.key)
        CLIENT_PUB=$(sudo cat client.pub)
        
        printf "[Interface]\nPrivateKey = %s\nAddress = 10.0.0.1/24\nListenPort = 51820\nPostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE\nPostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE\n\n[Peer]\nPublicKey = %s\nAllowedIPs = 10.0.0.2/32\n" "$SERVER_KEY" "$CLIENT_PUB" | sudo tee wg0.conf
        
        sudo systemctl enable wg-quick@wg0
        sudo systemctl start wg-quick@wg0

    - name: Generate Client Config
      run: |
        cd /etc/wireguard
        CLIENT_KEY=$(sudo cat client.key)
        SERVER_PUB=$(sudo cat server.pub)
        PUBLIC_IP=$(curl -s ifconfig.me)
        
        printf "[Interface]\nPrivateKey = %s\nAddress = 10.0.0.2/24\nDNS = 1.1.1.1\n\n[Peer]\nPublicKey = %s\nEndpoint = %s:51820\nAllowedIPs = 0.0.0.0/0\nPersistentKeepalive = 25\n" "$CLIENT_KEY" "$SERVER_PUB" "$PUBLIC_IP" | sudo tee /tmp/client.conf

    - name: Upload Config
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-config
        path: /tmp/client.conf

    - name: Keep Alive
      run: |
        sleep 6h
