name: VPN Server
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install WireGuard
        run: |
          sudo apt update
          sudo apt install -y wireguard

      - name: Full Setup
        run: |
          # ایجاد دایرکتوری و رفتن به اون
          sudo mkdir -p /etc/wireguard
          cd /etc/wireguard
          
          # تولید کلیدها
          sudo wg genkey | sudo tee server.key
          sudo wg pubkey < server.key | sudo tee server.pub
          sudo wg genkey | sudo tee client.key
          sudo wg pubkey < client.key | sudo tee client.pub
          
          # خوندن کلیدها
          SERVER_KEY=$(sudo cat server.key)
          CLIENT_PUB=$(sudo cat client.pub)
          
          # ساخت کانفیگ سرور
          sudo bash -c "cat > wg0.conf" << EOF
          [Interface]
          PrivateKey = $SERVER_KEY
          Address = 10.0.0.1/24
          ListenPort = 51820
          PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
          PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
          
          [Peer]
          PublicKey = $CLIENT_PUB
          AllowedIPs = 10.0.0.2/32
          EOF
          
          # فعال کردن IP forwarding
          sudo sysctl -w net.ipv4.ip_forward=1
          
          # اجرا کردن WireGuard
          sudo systemctl start wg-quick@wg0
          
          # درست کردن کانفیگ کلاینت
          CLIENT_KEY=$(sudo cat client.key)
          SERVER_PUB=$(sudo cat server.pub)
          SERVER_IP=$(curl -s ifconfig.me)
          
          cat > /tmp/client.conf << "EOF"
          [Interface]
          PrivateKey = PLACEHOLDER_KEY
          Address = 10.0.0.2/24
          DNS = 1.1.1.1
          
          [Peer]
          PublicKey = PLACEHOLDER_PUB
          Endpoint = PLACEHOLDER_IP:51820
          AllowedIPs = 0.0.0.0/0
          PersistentKeepalive = 25
          EOF
          
          # جایگزینی مقادیر
          sed -i "s|PLACEHOLDER_KEY|$CLIENT_KEY|g" /tmp/client.conf
          sed -i "s|PLACEHOLDER_PUB|$SERVER_PUB|g" /tmp/client.conf
          sed -i "s|PLACEHOLDER_IP|$SERVER_IP|g" /tmp/client.conf
          
          echo "Done! Config saved to /tmp/client.conf"

      - name: Upload Config
        uses: actions/upload-artifact@v4
        with:
          name: wireguard-config
          path: /tmp/client.conf

      - name: Keep Alive
        run: sleep 6h
