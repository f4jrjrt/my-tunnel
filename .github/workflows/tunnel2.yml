name: Build V2Ray Config
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install V2Ray
        run: |
          bash <(curl -L https://raw.githubusercontent.com/v2fly/fhs-install-v2ray/master/install-release.sh)

      - name: Generate Reality Config
        run: |
          # تولید کلیدهای Reality
          PRIVATE_KEY=$(openssl rand -base64 32)
          PUBLIC_KEY=$(echo -n $PRIVATE_KEY | xargs -0 xray x25519)
          SHORT_ID=$(openssl rand -hex 8)
          
          # ایجاد کانفیگ سرور
          cat > /usr/local/etc/v2ray/config.json << EOF
          {
            "inbounds": [
              {
                "port": 443,
                "protocol": "vless",
                "settings": {
                  "clients": [
                    {
                      "id": "$(cat /proc/sys/kernel/random/uuid)",
                      "flow": "xtls-rprx-vision"
                    }
                  ],
                  "decryption": "none"
                },
                "streamSettings": {
                  "network": "tcp",
                  "security": "reality",
                  "realitySettings": {
                    "show": false,
                    "dest": "www.google.com:443",
                    "xver": 0,
                    "serverNames": [
                      "www.google.com"
                    ],
                    "privateKey": "$PRIVATE_KEY",
                    "shortIds": [
                      "$SHORT_ID"
                    ]
                  }
                }
              }
            ],
            "outbounds": [
              {
                "protocol": "freedom",
                "tag": "direct"
              }
            ]
          }
          EOF
          
          # اجرای V2Ray
          systemctl start v2ray
          
          # ذخیره لینک کانفیگ
          PUBLIC_IP=$(curl -s ifconfig.me)
          CLIENT_UUID=$(grep -oP '"id": "\K[^"]+' /usr/local/etc/v2ray/config.json)
          
          echo "vless://$CLIENT_UUID@$PUBLIC_IP:443?security=reality&encryption=none&pbk=$PUBLIC_KEY&sid=$SHORT_ID&type=tcp&flow=xtls-rprx-vision&sni=www.google.com&fp=chrome#GitHub-VPN" > /tmp/config.txt
          
      - name: Upload Config
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-config
          path: /tmp/config.txt
