name: VPN Server
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Install WireGuard
      run: |
        sudo apt update
        sudo apt install -y wireguard

    - name: Setup VPN
      run: |
        sudo mkdir -p /etc/wireguard
        cd /etc/wireguard
        sudo wg genkey | sudo tee server.key
        sudo wg pubkey < server.key | sudo tee server.pub
        sudo wg genkey | sudo tee client.key
        sudo wg pubkey < client.key | sudo tee client.pub

    - name: Configure Server
      run: |
        sudo bash -c 'echo "[Interface]" > /etc/wireguard/wg0.conf'
        sudo bash -c 'echo "PrivateKey = '$(sudo cat /etc/wireguard/server.key)'" >> /etc/wireguard/wg0.conf'
        sudo bash -c 'echo "Address = 10.0.0.1/24" >> /etc/wireguard/wg0.conf'
        sudo bash -c 'echo "ListenPort = 51820" >> /etc/wireguard/wg0.conf'
        sudo bash -c 'echo "PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE" >> /etc/wireguard/wg0.conf'
        sudo bash -c 'echo "PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE" >> /etc/wireguard/wg0.conf'
        sudo bash -c 'echo "" >> /etc/wireguard/wg0.conf'
        sudo bash -c 'echo "[Peer]" >> /etc/wireguard/wg0.conf'
        sudo bash -c 'echo "PublicKey = '$(sudo cat /etc/wireguard/client.pub)'" >> /etc/wireguard/wg0.conf'
        sudo bash -c 'echo "AllowedIPs = 10.0.0.2/32" >> /etc/wireguard/wg0.conf'
        
        sudo sysctl -w net.ipv4.ip_forward=1

    - name: Start VPN
      run: |
        sudo systemctl start wg-quick@wg0
        sudo systemctl enable wg-quick@wg0

    - name: Create Client Config
      run: |
        CLIENT_KEY=$(sudo cat /etc/wireguard/client.key)
        SERVER_PUB=$(sudo cat /etc/wireguard/server.pub)
        SERVER_IP=$(curl -s ifconfig.me)
        
        echo "[Interface]" > /tmp/client.conf
        echo "PrivateKey = $CLIENT_KEY" >> /tmp/client.conf
        echo "Address = 10.0.0.2/24" >> /tmp/client.conf
        echo "DNS = 1.1.1.1" >> /tmp/client.conf
        echo "" >> /tmp/client.conf
        echo "[Peer]" >> /tmp/client.conf
        echo "PublicKey = $SERVER_PUB" >> /tmp/client.conf
        echo "Endpoint = $SERVER_IP:51820" >> /tmp/client.conf
        echo "AllowedIPs = 0.0.0.0/0" >> /tmp/client.conf
        echo "PersistentKeepalive = 25" >> /tmp/client.conf

    - name: Upload Config
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-config
        path: /tmp/client.conf

    - name: Keep Alive
      run: sleep 6h
