name: Build V2Ray Config
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Install V2Ray
      run: |
        wget https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
        unzip v2ray-linux-64.zip -d /tmp/v2ray
        chmod +x /tmp/v2ray/v2ray
        /tmp/v2ray/v2ray -version

    - name: Create V2Ray Config
      run: |
        mkdir -p /tmp/config
        UUID=$(cat /proc/sys/kernel/random/uuid)
        cat > /tmp/config/config.json << EOF
        {
          "inbounds": [
            {
              "port": 8080,
              "protocol": "vmess",
              "settings": {
                "clients": [
                  {
                    "id": "$UUID",
                    "alterId": 0
                  }
                ]
              },
              "streamSettings": {
                "network": "tcp"
              }
            }
          ],
          "outbounds": [
            {
              "protocol": "freedom",
              "settings": {}
            }
          ]
        }
        EOF
        
        # اجرای V2Ray
        /tmp/v2ray/v2ray -config /tmp/config/config.json &
        sleep 3

    - name: Create Tunnel
      run: |
        wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        ./cloudflared-linux-amd64 tunnel --url http://localhost:8080 --no-autoupdate &
        sleep 10
        
        # گرفتن آدرس تونل
        curl -s http://localhost:8081/quicktunnel | grep -o 'https://[a-z-]*\.trycloudflare\.com' || echo "https://check.trycloudflare.com"

    - name: Generate Client Config
      run: |
        UUID=$(cat /proc/sys/kernel/random/uuid)
        PUBLIC_IP=$(curl -s ifconfig.me)
        
        # کانفیگ VMess
        VMESS_CONFIG="vmess://$(echo -n "{\"v\":\"2\",\"ps\":\"GitHub-VPN\",\"add\":\"$PUBLIC_IP\",\"port\":\"8080\",\"id\":\"$UUID\",\"aid\":\"0\",\"scy\":\"auto\",\"net\":\"tcp\",\"type\":\"none\",\"host\":\"\",\"path\":\"\",\"tls\":\"\"}" | base64 -w 0)"
        
        echo "========== LINK 1: VMESS ==========" > /tmp/links.txt
        echo "$VMESS_CONFIG" >> /tmp/links.txt
        echo "" >> /tmp/links.txt
        echo "========== LINK 2: VLESS ==========" >> /tmp/links.txt
        echo "vless://$UUID@$PUBLIC_IP:8080?encryption=none&security=none&type=tcp#GitHub-VPN" >> /tmp/links.txt

    - name: Upload Config
      uses: actions/upload-artifact@v4
      with:
        name: v2ray-links
        path: /tmp/links.txt

    - name: Keep Alive
      run: sleep 6h
