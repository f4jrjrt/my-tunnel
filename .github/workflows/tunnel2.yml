name: VPN Server (WireGuard)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Install WireGuard
      run: |
        sudo apt update
        sudo apt install -y wireguard

    - name: Setup WireGuard Server
      run: |
        # ایجاد دایرکتوری با دسترسی root
        sudo mkdir -p /etc/wireguard
        sudo chmod 755 /etc/wireguard
        cd /etc/wireguard
        
        # تولید کلیدها
        sudo bash -c 'umask 077; wg genkey | tee server.key | wg pubkey | tee server.pub'
        sudo bash -c 'umask 077; wg genkey | tee client.key | wg pubkey | tee client.pub'
        
        # خوندن کلیدها
        SERVER_KEY=$(sudo cat /etc/wireguard/server.key)
        CLIENT_PUB=$(sudo cat /etc/wireguard/client.pub)
        
        # ساخت فایل کانفیگ سرور
        sudo bash -c "cat > /etc/wireguard/wg0.conf <<EOF
[Interface]
PrivateKey = $SERVER_KEY
Address = 10.0.0.1/24
ListenPort = 51820
PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

[Peer]
PublicKey = $CLIENT_PUB
AllowedIPs = 10.0.0.2/32
EOF"
        
        # اجرای WireGuard
        sudo sysctl -w net.ipv4.ip_forward=1
        sudo systemctl enable wg-quick@wg0
        sudo systemctl start wg-quick@wg0

    - name: Generate Client Config
      run: |
        CLIENT_KEY=$(sudo cat /etc/wireguard/client.key)
        SERVER_PUB=$(sudo cat /etc/wireguard/server.pub)
        PUBLIC_IP=$(curl -s ifconfig.me)
        
        # ساخت کانفیگ کلاینت
        cat > /tmp/client.conf <<EOF
[Interface]
PrivateKey = $CLIENT_KEY
Address = 10.0.0.2/24
DNS = 1.1.1.1

[Peer]
PublicKey = $SERVER_PUB
Endpoint = $PUBLIC_IP:51820
AllowedIPs = 0.0.0.0/0
PersistentKeepalive = 25
EOF
        
        echo "✅ Client config created at /tmp/client.conf"

    - name: Upload Config
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-config
        path: /tmp/client.conf

    - name: Keep Alive
      run: |
        echo "VPN is running for 6 hours"
        sleep 6h
