name: VPN Server
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Install WireGuard
      run: sudo apt update && sudo apt install -y wireguard

    - name: Make directories
      run: |
        sudo mkdir -p /etc/wireguard
        sudo chmod 755 /etc/wireguard

    - name: Generate server keys
      run: |
        cd /etc/wireguard
        sudo wg genkey | sudo tee server.key
        sudo wg pubkey < server.key | sudo tee server.pub

    - name: Generate client keys
      run: |
        cd /etc/wireguard
        sudo wg genkey | sudo tee client.key
        sudo wg pubkey < client.key | sudo tee client.pub

    - name: Create server config
      run: |
        SERVER_KEY=$(sudo cat /etc/wireguard/server.key)
        CLIENT_PUB=$(sudo cat /etc/wireguard/client.pub)
        sudo bash -c "cat > /etc/wireguard/wg0.conf << EOF
[Interface]
PrivateKey = $SERVER_KEY
Address = 10.0.0.1/24
ListenPort = 51820
PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

[Peer]
PublicKey = $CLIENT_PUB
AllowedIPs = 10.0.0.2/32
EOF"

    - name: Enable IP forwarding
      run: sudo sysctl -w net.ipv4.ip_forward=1

    - name: Start WireGuard
      run: |
        sudo systemctl start wg-quick@wg0
        sudo systemctl enable wg-quick@wg0

    - name: Generate client config
      run: |
        CLIENT_KEY=$(sudo cat /etc/wireguard/client.key)
        SERVER_PUB=$(sudo cat /etc/wireguard/server.pub)
        SERVER_IP=$(curl -s ifconfig.me)
        cat > /tmp/client.conf << EOF
[Interface]
PrivateKey = $CLIENT_KEY
Address = 10.0.0.2/24
DNS = 1.1.1.1

[Peer]
PublicKey = $SERVER_PUB
Endpoint = $SERVER_IP:51820
AllowedIPs = 0.0.0.0/0
PersistentKeepalive = 25
EOF

    - name: Upload config
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-config
        path: /tmp/client.conf

    - name: Keep alive
      run: sleep 6h
