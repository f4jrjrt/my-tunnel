name: V2Ray Tunnel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Install V2Ray
      run: |
        curl -L https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip -o /tmp/v2ray.zip
        unzip -o /tmp/v2ray.zip -d /tmp/v2ray
        chmod +x /tmp/v2ray/v2ray

    - name: Run V2Ray
      run: |
        UUID=$(cat /proc/sys/kernel/random/uuid)
        cat > /tmp/config.json << EOF
        {
          "inbounds": [{
            "port": 8080,
            "protocol": "vmess",
            "settings": {
              "clients": [{"id": "$UUID"}]
            }
          }],
          "outbounds": [{"protocol": "freedom"}]
        }
        EOF
        /tmp/v2ray/v2ray -config /tmp/config.json &
        sleep 5

    - name: Install Cloudflared
      run: |
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cloudflared
        chmod +x /tmp/cloudflared

    - name: Create Tunnel
      run: |
        /tmp/cloudflared tunnel --url http://localhost:8080 --no-autoupdate &
        sleep 15
        echo "✅ Tunnel is running!"

    - name: Get Links
      run: |
        UUID=$(cat /proc/sys/kernel/random/uuid)
        echo "🔗 VMESS Link (copy this):" > /tmp/links.txt
        echo "vmess://$(echo -n "{\"v\":\"2\",\"ps\":\"GH-Tunnel\",\"add\":\"localhost\",\"port\":\"8080\",\"id\":\"$UUID\",\"aid\":\"0\",\"net\":\"tcp\"}" | base64)" >> /tmp/links.txt

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: links
        path: /tmp/links.txt

    - name: Keep
      run: sleep 6h
