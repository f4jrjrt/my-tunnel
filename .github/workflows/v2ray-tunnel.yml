name: V2Ray Tunnel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Install V2Ray
      run: |
        curl -L https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip -o /tmp/v2ray.zip
        unzip -o /tmp/v2ray.zip -d /tmp/v2ray
        chmod +x /tmp/v2ray/v2ray

    - name: Run V2Ray
      run: |
        UUID=$(cat /proc/sys/kernel/random/uuid)
        cat > /tmp/config.json << EOF
        {
          "inbounds": [{
            "port": 8080,
            "protocol": "vmess",
            "settings": {
              "clients": [{"id": "$UUID"}]
            }
          }],
          "outbounds": [{"protocol": "freedom"}]
        }
        EOF
        /tmp/v2ray/v2ray -config /tmp/config.json &
        sleep 5

    - name: Install Cloudflared
      run: |
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cloudflared
        chmod +x /tmp/cloudflared

    - name: Create Tunnel
      run: |
        /tmp/cloudflared tunnel --url http://localhost:8080 --no-autoupdate &
        sleep 15
        echo "✅ Tunnel is running!"

    - name: 🔥 OUTPUT LINKS (COPY THESE) 🔥
      run: |
        UUID=$(cat /proc/sys/kernel/random/uuid)
        TUNNEL_URL=$(curl -s http://localhost:8081/quicktunnel | grep -o 'https://[a-z-]*\.trycloudflare\.com' | head -1)
        
        echo "============================================="
        echo "🔥🔥🔥 کانفیگ های تو - اینارو کپی کن 🔥🔥🔥"
        echo "============================================="
        echo ""
        echo "📌 آدرس تونل:"
        echo "$TUNNEL_URL"
        echo ""
        echo "📌 لینک VMESS (کپی کن و بریز تو V2RayNG):"
        echo "vmess://$(echo -n "{\"v\":\"2\",\"ps\":\"GH-Tunnel\",\"add\":\"${TUNNEL_URL#https://}\",\"port\":\"80\",\"id\":\"$UUID\",\"aid\":\"0\",\"net\":\"tcp\"}" | base64 -w 0)"
        echo ""
        echo "📌 لینک VLESS (کپی کن):"
        echo "vless://$UUID@${TUNNEL_URL#https://}:80?encryption=none&security=none&type=tcp#GitHub-Tunnel"
        echo ""
        echo "============================================="
        echo "✅ این لینک‌ها رو کپی کن و توی V2RayNG/nekobox وارد کن"
        echo "============================================="

    - name: Keep Alive
      run: sleep 6h
